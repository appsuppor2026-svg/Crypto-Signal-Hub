<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1024px; height: 500px; overflow: hidden;
    background: #0A0A0F;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .bg-glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
  }
  .glow1 { width: 400px; height: 400px; background: #f7931a; top: -100px; left: -80px; }
  .glow2 { width: 350px; height: 350px; background: #1a6ff7; bottom: -100px; right: 100px; }
  .glow3 { width: 250px; height: 250px; background: #00ff88; top: 50px; right: 300px; opacity: 0.08; }

  .container {
    display: flex; align-items: center; gap: 64px;
    padding: 48px; position: relative; z-index: 1; width: 100%;
  }

  .left { flex: 0 0 auto; text-align: center; }
  .icon-wrap {
    width: 110px; height: 110px; border-radius: 26px;
    background: linear-gradient(135deg, #1a1a2e, #0f3460);
    border: 2px solid #f7931a40;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 0 40px #f7931a30;
  }
  .icon-wrap svg { width: 64px; height: 64px; }
  .app-name {
    font-size: 15px; font-weight: 800; letter-spacing: 0.08em;
    color: #f7931a; font-family: monospace; text-transform: uppercase;
  }
  .app-sub { font-size: 11px; color: #8b949e; margin-top: 4px; letter-spacing: 0.05em; }

  .divider {
    width: 1px; height: 280px; flex-shrink: 0;
    background: linear-gradient(to bottom, transparent, #f7931a40, transparent);
  }

  .right { flex: 1; }
  .tagline {
    font-size: 32px; font-weight: 800; line-height: 1.15;
    color: #e6edf3; margin-bottom: 10px;
  }
  .tagline span { color: #f7931a; }
  .desc {
    font-size: 14px; color: #8b949e; margin-bottom: 28px; line-height: 1.6;
    max-width: 440px;
  }

  .features {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .feat {
    display: flex; align-items: center; gap: 10px;
    background: #ffffff08; border: 1px solid #ffffff0f;
    border-radius: 10px; padding: 10px 14px;
  }
  .feat-icon { font-size: 18px; flex-shrink: 0; }
  .feat-text { font-size: 12px; color: #c9d1d9; font-weight: 500; }

  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: #f7931a15; border: 1px solid #f7931a40;
    border-radius: 20px; padding: 4px 14px;
    font-size: 11px; font-weight: 700; color: #f7931a;
    margin-bottom: 18px; letter-spacing: 0.04em;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #f7931a; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>
<body>
  <div class="bg-glow glow1"></div>
  <div class="bg-glow glow2"></div>
  <div class="bg-glow glow3"></div>

  <div class="container">
    <div class="left">
      <div class="icon-wrap">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="28" stroke="#f7931a" stroke-width="2.5" stroke-dasharray="6 3" opacity="0.5"/>
          <circle cx="32" cy="32" r="18" stroke="#f7931a" stroke-width="2" opacity="0.8"/>
          <circle cx="32" cy="32" r="6" fill="#f7931a"/>
          <line x1="32" y1="4" x2="32" y2="14" stroke="#f7931a" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="32" y1="50" x2="32" y2="60" stroke="#f7931a" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="4" y1="32" x2="14" y2="32" stroke="#f7931a" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="50" y1="32" x2="60" y2="32" stroke="#f7931a" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="32" cy="32" r="10" fill="#f7931a" opacity="0.15"/>
        </svg>
      </div>
      <div class="app-name">LRC</div>
      <div class="app-sub">Liquidity Radar Crypto</div>
    </div>

    <div class="divider"></div>

    <div class="right">
      <div class="badge"><div class="dot"></div> Tiempo real</div>
      <div class="tagline">Analiza la <span>liquidez</span><br>del mercado cripto</div>
      <div class="desc">Señales profesionales, alertas inteligentes y análisis AI para tomar mejores decisiones en crypto.</div>
      <div class="features">
        <div class="feat"><span class="feat-icon">📡</span><span class="feat-text">Radar Score de liquidez</span></div>
        <div class="feat"><span class="feat-icon">🔔</span><span class="feat-text">Alertas de precio</span></div>
        <div class="feat"><span class="feat-icon">📊</span><span class="feat-text">Gráficos con EMA y BB</span></div>
        <div class="feat"><span class="feat-icon">🤖</span><span class="feat-text">Análisis AI por activo</span></div>
      </div>
    </div>
  </div>
</body>
</html>
