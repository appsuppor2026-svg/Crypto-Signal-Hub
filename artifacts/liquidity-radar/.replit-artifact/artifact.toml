kind = "web"
previewPath = "/"
title = "Liquidity Radar Crypto"
version = "1.0.0"
id = "artifacts/liquidity-radar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21691

[services.development]
run = "pnpm --filter @workspace/liquidity-radar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/liquidity-radar", "run", "build" ]
publicDir = "artifacts/liquidity-radar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21691"
BASE_PATH = "/"
